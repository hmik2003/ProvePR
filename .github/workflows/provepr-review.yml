name: ProvePR review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [staging]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ProvePR
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract Jira key
        id: jira
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          KEY=$(PYTHONPATH=src python -c "import os; from provepr.jira_key import extract_jira_key; print(extract_jira_key(os.environ.get('PR_TITLE'), os.environ.get('PR_BRANCH'), os.environ.get('PR_BODY')) or '')")
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          if [ -z "$KEY" ]; then
            echo "No Jira key in title/branch/body — skipping review (safe)."
          else
            echo "Found Jira key: $KEY"
          fi

      - name: Run ProvePR review + publish
        if: steps.jira.outputs.key != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_SERVER_URL: ${{ secrets.JIRA_SERVER_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
          PYTHONPATH: src
        run: |
          python -m provepr review --yes --post \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --ticket "${{ steps.jira.outputs.key }}"
