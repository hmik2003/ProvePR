name: ProvePR review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [staging]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ProvePR
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract Jira key
        id: jira
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          # Company policy: exactly one Jira key in the PR title (1 ticket ↔ 1 PR).
          # Branch/body are fallback only when title has zero keys.
          EVAL=$(PYTHONPATH=src python - <<'PY'
          import os
          from provepr.jira_key import extract_jira_key, primary_jira_key_from_title
          title = os.environ.get("PR_TITLE") or ""
          branch = os.environ.get("PR_BRANCH") or ""
          body = os.environ.get("PR_BODY") or ""
          primary, title_keys = primary_jira_key_from_title(title)
          if len(title_keys) > 1:
              print(f"SKIP|multiple|{','.join(title_keys)}")
          elif primary:
              print(f"OK|{primary}|title")
          else:
              fallback = extract_jira_key(None, branch, body) or ""
              if fallback:
                  print(f"OK|{fallback}|fallback")
              else:
                  print("SKIP|none|")
          PY
          )
          STATUS=$(echo "$EVAL" | cut -d'|' -f1)
          KEY=$(echo "$EVAL" | cut -d'|' -f2)
          SRC=$(echo "$EVAL" | cut -d'|' -f3)
          if [ "$STATUS" = "OK" ] && [ -n "$KEY" ]; then
            echo "key=$KEY" >> "$GITHUB_OUTPUT"
            if [ "$SRC" = "fallback" ]; then
              echo "Found Jira key via branch/body: $KEY (prefer exactly one key in the PR title)."
            else
              echo "Found Jira key in title: $KEY"
            fi
          else
            echo "key=" >> "$GITHUB_OUTPUT"
            if [ "$KEY" = "multiple" ]; then
              echo "Multiple Jira keys in PR title ($SRC) — company policy is 1 ticket per PR. Skipping review."
            else
              echo "No Jira key in title/branch/body — skipping review (safe)."
            fi
          fi

      - name: Run ProvePR review + publish
        if: steps.jira.outputs.key != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_SERVER_URL: ${{ secrets.JIRA_SERVER_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_USER_ID: ${{ secrets.SLACK_DM_USER_ID }}
          PYTHONPATH: src
          HERMES_ENABLE_PROJECT_PLUGINS: "1"
        run: |
          python -m provepr review --yes --post \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --ticket "${{ steps.jira.outputs.key }}"
